<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#a855f7">
  <title>ReklamAtla — Çevrimdışı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 2rem;
    }
    button {
      background: #a855f7;
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #9333ea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Çevrimdışısınız</h1>
    <p>İnternet bağlantınız yok. Bağlantınız geldiğinde tekrar deneyin.</p>
    <button onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
